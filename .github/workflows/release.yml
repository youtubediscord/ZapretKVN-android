name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag for a new release
        required: true
        type: string
      final_gate_approved:
        description: Physical Gate 8 and production-key device check are complete
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: release
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      ZAPRET_UPDATE_REPOSITORY: ${{ github.repository }}
      ZAPRET_SIGNING_STORE_FILE: ${{ runner.temp }}/zapret-kvn-release.jks
      ZAPRET_REQUIRE_SIGNED_RELEASE: "1"
      ZAPRET_EXPECTED_SIGNER_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}

    steps:
      - name: Require explicit final-gate attestation
        shell: bash
        env:
          FINAL_GATE_APPROVED: ${{ inputs.final_gate_approved }}
        run: test "$FINAL_GATE_APPROVED" = true

      - name: Checkout exact release tag
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up OpenJDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Read pinned versions and release version
        id: versions
        shell: bash
        run: |
          source core.properties
          echo "go=$GO_VERSION" >> "$GITHUB_OUTPUT"
          scripts/derive-release-version.sh "$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install pinned Android packages
        shell: bash
        run: |
          source core.properties
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platforms;android-$ANDROID_COMPILE_SDK" \
            "build-tools;$ANDROID_BUILD_TOOLS" \
            "ndk;$ANDROID_NDK_VERSION"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Restore signing key from GitHub Secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$ZAPRET_SIGNING_STORE_FILE"
          chmod 600 "$ZAPRET_SIGNING_STORE_FILE"

      - name: Verify, test and build signed APK
        env:
          ZAPRET_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ZAPRET_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ZAPRET_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: scripts/ci-build.sh

      - name: Run Android and no-background-traffic gates
        shell: bash
        run: |
          source core.properties
          sudo apt-get update
          sudo apt-get install -y socat
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "system-images;android-$ANDROID_COMPILE_SDK;google_apis;x86_64"
          printf 'no\n' | avdmanager create avd \
            --force \
            --name release_gate_api36 \
            --package "system-images;android-$ANDROID_COMPILE_SDK;google_apis;x86_64"
          sudo chown "$(id -un)" /dev/kvm || true
          emulator -avd release_gate_api36 -no-window -no-audio -no-boot-anim \
            -gpu swiftshader_indirect -no-snapshot -wipe-data > emulator.log 2>&1 &
          adb wait-for-device
          timeout 300 bash -c 'until [[ "$(adb shell getprop sys.boot_completed | tr -d "\r")" == 1 ]]; do sleep 2; done'
          ./gradlew connectedDebugAndroidTest
          mkdir -p build/gate6-process-recreation build/gate8-stress
          scripts/verify-process-recreation.sh | tee build/gate6-process-recreation/result.txt
          scripts/verify-gate8-stress.sh | tee build/gate8-stress/result.txt
          scripts/verify-gate8-performance.sh

      - name: Create verified release bundle
        shell: bash
        run: |
          release_apk="$(find app/build/outputs/apk/release -type f -name '*.apk' -print -quit)"
          scripts/create-release-bundle.sh "$RELEASE_TAG" "$release_apk" release-out

      - name: Upload release proof
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zapret-kvn-${{ env.RELEASE_TAG }}-proof
          if-no-files-found: error
          path: |
            release-out/**
            app/build/permissions.txt
            app/build/manifest-tree.txt
            app/build/outputs/mapping/release/mapping.txt
            core-build/output/core-version.txt
            core-build/output/core-build-metadata.json
            core-build/output/native-debug-symbols.zip
            core-build/output/native-symbols-metadata.json
            core-build/output/native-symbols-SHA256SUMS
            build/release-candidate/security-report.json
            build/gate6-process-recreation/**
            build/gate8-stress/**
            build/gate8-performance/**
            app/build/reports/androidTests/connected/**
            emulator.log

      - name: Publish release assets once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to replace published assets" >&2
            exit 1
          fi
          prerelease=()
          if [[ "$ZAPRET_PRERELEASE" == true ]]; then prerelease=(--prerelease); fi
          apk="$(find release-out -maxdepth 1 -type f -name '*.apk' -print -quit)"
          gh release create "$RELEASE_TAG" \
            "$apk" "$apk.sha256" release-out/release-metadata.json \
            --verify-tag \
            --title "Zapret KVN $ZAPRET_VERSION_NAME" \
            --notes-file release-out/RELEASE_NOTES.md \
            "${prerelease[@]}"

      - name: Remove signing key
        if: always()
        shell: bash
        run: |
          rm -f "$ZAPRET_SIGNING_STORE_FILE"
          adb emu kill >/dev/null 2>&1 || true
